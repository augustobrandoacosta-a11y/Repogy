<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Tablet & Desktop</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .ui { margin: 10px; font-size: 24px; font-weight: bold; }
        canvas { border: 3px solid #444; background: #222; max-width: 95vw; }
        .instructions { font-size: 14px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">
        Keyboard: WASD to Walk | Space: Hit | B: Bazooka<br>
        Tablet: Tap Screen to Attack | Swipe to Move
    </div>
    <script src="game.js"></script>
</body>
</html>
